name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  setup:
    name: "Initial setup & prerequisites (isWorkComputer=${{ matrix.isWorkComputer }})"
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        isWorkComputer: [true, false]
    steps:
      - uses: actions/checkout@v6

      - name: Pre-seed chezmoi config (avoids interactive prompts)
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          cat > "$HOME/.config/chezmoi/chezmoi.toml" <<EOF
          [data]
              isWorkComputer = ${{ matrix.isWorkComputer }}
              onedriveProjectsBackupDir = "/tmp/onedrive-ci"
          EOF

      - name: Run .install-prerequisites.sh
        run: yes '' | ./.install-prerequisites.sh

      - name: Run .initial-setup.sh, including chezmoi apply
        env:
          CHEZMOI_INIT_SOURCE: ${{ github.workspace }}
          CHEZMOI_APPLY: "true"
        run: ./.initial-setup.sh

      - name: Show resolved chezmoi config
        run: chezmoi cat-config

  bats:
    name: Bats tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install test tooling
        run: brew install bats-core yq

      - name: Run bats tests
        run: bats tests/
