# Curated subset of `$HOME/Projects` to back up and restore on a new
# laptop. Produced by hand: run `./scan_repos.sh "$HOME/Projects"`, copy
# its output here, and delete entries you don't want to carry forward
# (also prune each repo's ignored_files down to actual secrets worth
# restoring, e.g. drop cache/lock files).
#
# The real, curated version of this file is NOT committed to this repo --
# it names private/internal repos and org structure that don't belong in a
# public dotfiles repo. Instead it round-trips through Bitwarden:
#   - after curating it locally, run ./export-projects-yaml.sh to push it
#   - on a new laptop, run ./fetch-projects-yaml.sh to pull it back down
#     (before running restore-projects.sh)
# fetch-projects-yaml.sh marks the local file git-skip-worktree, so real
# data written here won't show up in `git status`/`git diff` or get
# committed over this placeholder.
#
# Schema (matches scan_repos.sh's output):
#   root: absolute path scan_repos.sh was run against
#   repos[].path: absolute path to a git repo
#   repos[].remotes[].name / .url: git remotes
#   repos[].auth: optional, "https" for repos that need username/password
#     auth instead of SSH (e.g. Adobe Cloud Manager git). Omit for plain SSH
#     clones (the default). When set to "https", auth_secret must also be
#     set (see below).
#   repos[].auth_secret: required when auth is "https" -- restore-projects.sh
#     looks up username/password from a Bitwarden login item named
#     repo-auth:<auth_secret>, created/updated by
#     ./add_repo_auth_to_bw.sh <auth_secret>. Repos that share credentials
#     (e.g. all repos under one customer's Cloud Manager program) should
#     use the same auth_secret value -- a common choice is the customer
#     name, but any string works as long as it's consistent.
#   repos[].ssh_identity: optional, for SSH repos only -- the filename (under
#     ~/.ssh) of the key that must be loaded in the ssh-agent to clone this
#     repo, e.g. "id_git_corp_ed25519" vs "id_rsa_adobepc" for a different
#     GitHub account (same pattern as the gitmre/gitmarcore dot_zshrc
#     aliases: ssh-add -D && ssh-add ~/.ssh/<name>). restore-projects.sh
#     switches the agent's loaded identity before cloning such a repo, only
#     when it differs from the last repo's. Because agent state carries
#     over between repos in the same restore run, set this explicitly on
#     EVERY repo that needs a non-default identity, including runs of the
#     "default" one that come after a differently-identified repo -- don't
#     rely on "whatever's currently loaded" once you're mixing identities.
#     Omit entirely for repos that don't need identity switching.
#   repos[].ignored_files[]: gitignored files to restore via Bitwarden
#     (proj-secret:<repo-path-relative-to-root>:<file-relative-path>,
#     stored chunked across multiple secure notes, not base64 in a single
#     item's `notes` -- Bitwarden caps `notes` at 10000 encrypted
#     characters, too small for most real secret files, and attachments
#     require a Bitwarden Premium subscription)
#   folders[].path: absolute path to a plain (non-git) project root
#   folders[].nested_repos[]: paths of git repos found inside that root,
#     relative to it — excluded from its zip archive, restored via clone.
#     Each entry must have a matching repos[].path equal to
#     folder_path + "/" + nested_repo_relative_path; if you prune that
#     repos[] entry but leave the nested_repos reference, restore will
#     print a (non-fatal) "WARN: no repos[] entry found" for it.
root: ""
repos: []
folders: []
